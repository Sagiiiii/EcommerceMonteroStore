<!-- ════════════════════════════════════════════════════════════
      MÓDULO: Registro de Administrador — MONTERO'S
      Panel Administrativo · JAIME PONCE MONTERO
      ════════════════════════════════════════════════════════════ -->

<div class="registro-wrapper">
  <div class="row justify-content-center w-100">
    <div class="col-lg-6 col-md-8 col-sm-10">
      <div class="registro-card">

        <!-- Marca -->
        <div class="text-center mb-4">
          <h2 class="registro-brand">MONTERO'S</h2>
          <p class="registro-brand-sub">Panel Administrativo</p>
        </div>

        <!-- Encabezado -->
        <h4 class="registro-title text-center mb-1">Registro de administrador</h4>
        <p class="registro-subtitle text-muted text-center mb-4">
          Complete el formulario para crear su cuenta de acceso al sistema de <strong>MONTERO'S</strong>.
        </p>

        <!-- Formulario -->
        <form #registerForm="ngForm" (ngSubmit)="registro(registerForm)" novalidate>

          <div class="row">

            <!-- Nombres -->
            <div class="col-sm-6 form-group">
              <label class="form-label" for="reg-nombres">
                <i class="cxi-profile mr-1"></i> Nombres
              </label>
              <input type="text" class="form-control" id="reg-nombres"
                name="nombres" placeholder="Ingrese su nombre"
                required [(ngModel)]="user.nombres">
            </div>

            <!-- Apellidos -->
            <div class="col-sm-6 form-group">
              <label class="form-label" for="reg-apellidos">
                <i class="cxi-profile mr-1"></i> Apellido paterno / materno
              </label>
              <input type="text" class="form-control" id="reg-apellidos"
                name="apellidos" placeholder="Ingrese sus apellidos"
                required [(ngModel)]="user.apellidos">
            </div>

            <!-- Correo electrónico -->
            <div class="col-sm-12 form-group">
              <label class="form-label" for="reg-email">
                <i class="cxi-mail mr-1"></i> Correo electrónico
              </label>
              <input type="email" class="form-control" id="reg-email"
                name="email" placeholder="Ingrese su correo electrónico"
                required [(ngModel)]="user.email">
            </div>

            <!-- Contraseña -->
            <div class="col-sm-12 form-group">
              <label class="form-label" for="reg-password">
                <i class="cxi-lock mr-1"></i> Contraseña
              </label>
              <div class="cs-password-toggle input-group-overlay">
                <input type="password" class="form-control appended-form-control"
                  id="reg-password" name="password"
                  placeholder="Ingrese su contraseña"
                  required [(ngModel)]="user.password">
                <div class="input-group-append-overlay">
                  <label class="btn cs-password-toggle-btn input-group-text">
                    <input type="checkbox" class="custom-control-input">
                    <i class="cxi-eye cs-password-toggle-indicator"></i>
                    <span class="sr-only">Mostrar contraseña</span>
                  </label>
                </div>
              </div>
            </div>

            <!-- Teléfono -->
            <div class="col-sm-6 form-group">
              <label class="form-label" for="reg-telefono">
                <i class="cxi-whatsapp mr-1"></i> Teléfono
              </label>
              <input type="tel" class="form-control" id="reg-telefono"
                name="telefono" placeholder="Ej.: 987 654 321"
                required [(ngModel)]="user.telefono">
            </div>

            <!-- DNI -->
            <div class="col-sm-6 form-group">
              <label class="form-label" for="reg-dni">
                <i class="cxi-files mr-1"></i> DNI
              </label>
              <input type="text" class="form-control" id="reg-dni"
                name="dni" placeholder="Ej.: 12345678"
                required maxlength="8" [(ngModel)]="user.dni">
              <small class="form-text text-muted">
                Documento Nacional de Identidad (8 dígitos).
              </small>
            </div>

          </div>

          <!-- Botón de registro -->
          <button type="submit" class="btn btn-primary btn-block mt-3">
            <i class="cxi-check mr-1"></i> Crear cuenta
          </button>

          <!-- Enlace a login -->
          <div class="text-center mt-3">
            <p class="font-size-sm text-muted mb-0">
              ¿Ya tiene una cuenta?
              <a [routerLink]="['/login']">
                <i class="cxi-login mr-1"></i> Iniciar sesión
              </a>
            </p>
          </div>

        </form>

        <!-- Pie -->
        <p class="text-center text-muted registro-footer mt-4 mb-0">
          &copy; {{ currentYear }} MONTERO'S · Sistema de gestión administrativa
        </p>

      </div>
    </div>
  </div>
</div>
