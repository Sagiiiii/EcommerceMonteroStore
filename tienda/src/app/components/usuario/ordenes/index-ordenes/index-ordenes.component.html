<app-nav></app-nav>

<main  class="cs-page-wrapper">
    
        <!-- Breadcrumb -->
        <nav class="bg-secondary mb-3" aria-label="breadcrumb">
            <div class="container">
            <ol class="breadcrumb breadcrumb-alt mb-0">
                <li class="breadcrumb-item">
                <a [routerLink]="['/']"><i class="cxi-home"></i></a>
                </li>
                <li class="breadcrumb-item active" aria-current="page">Mis Ordenes</li>
            </ol>
            </div>
        </nav>

      <!-- Page container -->
      <section class="container pt-3 pt-lg-4 pb-5 pb-lg-6">
        <div class="row pb-2 pb-lg-0"> 

          <!-- Account menu (sticky sidebar) -->
          <aside class="col-xl-3 col-lg-4 pb-3 mb-4 mb-lg-0">
            <app-sidebar></app-sidebar>
          </aside>   
          
          <div class="col-lg-8 ml-auto">
            <div class="d-flex align-items-center justify-content-between mb-4 pb-sm-2">
              <h1 class="h2 mb-0">Mis ordenes</h1>
              <!-- <div class="form-inline">
                <label for="sort-orders" class="d-none d-sm-block font-weight-bold mr-2 pr-1">Sort orders</label>
                <select id="sort-orders" class="custom-select">
                  <option>All</option>
                  <option>Delivered</option>
                  <option>In Progress</option>
                  <option>Delayed</option>
                  <option>Canceled</option>
                </select>
              </div> -->
            </div>

            <!-- Orders accordion -->
            <ng-container *ngIf="ordenes.length >= 1">

              <div *ngIf="!load_data" class="accordion-alt" id="orders">              

                <!-- Order -->
                <div class="card border-bottom" *ngFor="let item of ordenes | slice: (page-1)*pageSize : (page-1) * pageSize + pageSize">
                  
                  <div class="card-header accordion-heading py-1">
                    <a [routerLink]="['/cuenta/ordenes',item._id]" routerLinkActive="router-link-active"  class="d-flex flex-wrap justify-content-between py-3" data-toggle="collapse" aria-expanded="false">
                      <span class="pr-2"># {{item._id.toUpperCase()}}</span>
                      <span class="font-size-sm text-muted text-nowrap px-2">
                        <i class="cxi-clock font-size-base align-middle mt-n1 mr-1"></i>
                        {{item.createdAt | date}}
                      </span>
                      <div *ngIf="item.estado == 'Procesando'">
                        <span class="badge badge-secondary mb-3">{{item.estado}}</span>
                      </div>
                      <div *ngIf="item.estado == 'Enviado'">
                          <span class="badge badge-info mb-3">{{item.estado}}</span>
                      </div>
                      <div *ngIf="item.estado == 'Cancelado'">
                          <span class="badge badge-danger mb-3">{{item.estado}}</span>
                      </div>
                      <div *ngIf="item.estado == 'Finalizado'">
                          <span class="badge badge-success mb-3">{{item.estado}}</span>
                      </div>
                      <div *ngIf="item.estado == 'Recibido'">
                          <span class="badge badge-success mb-3">{{item.estado}}</span>
                      </div>
                      <div *ngIf="item.estado == 'Pendiente Cobro'">
                        <span class="badge badge-warning mb-3">{{item.estado}}</span>
                    </div>
                      <span class="text-dark pl-1">S/ {{item.subtotal}}</span>
                    </a>
                  </div>

                                                                 
                    <div *ngIf="item.estado == 'Recibido' || item.estado == 'Finalizado'">

                      <div class="col-12">
                        <!-- Combo box para seleccionar el nuevo estado -->                    
                        <p class="text-dark">Gracias el producto ya se entrego ...</p>
                      </div>
                      
                    </div>       
                    <div *ngIf="item.estado != 'Recibido' || item.estado != 'Finalizado'">

                      <div class="row mb-4">

                        <div class="col-4">
                          <!-- Combo box para seleccionar el nuevo estado -->                    
                          <select class="form-control custom-select" value="{{item.estado}}" name="nuevoEstado" required [(ngModel)]="item.nuevoEstado">
                            <option value="" disabled selected>Seleccione una opción</option>
                            <option value="Recibido">Recibido</option>
                            <option value="Cancelado">Cancelar Pedido</option>
                          </select> 
                        </div>
  
                        <div class="col-2">
                          <!-- Botón para cambiar el estado -->
                          <button type="button" class="btn btn-dark btn-sm" (click)="cambiarEstado(item._id, item.nuevoEstado)">Registrar</button>
                        </div> 

                      </div>
                                
                    </div>              
                                 
                  
                </div>
              </div>

            </ng-container>

            <ng-container *ngIf="ordenes.length == 0">

              <div class="card border-bottom" >
                  
                <div class="card-header accordion-heading py-1">
                  <a href="#order-2" class="d-flex flex-wrap justify-content-between py-3">
                    <span class="text-muted">No tienes ninguna orden en tu cuenta 😇</span>
                  </a>
                </div>
              </div>

            </ng-container>

            <div *ngIf="load_data" class="row mt-3">
              <div class="col-12 text-center">
                <!-- Custom size border spinner -->
                <div class="spinner-border" style="width: 3rem; height: 3rem;" role="status">
                  <span class="sr-only"> Loading... </span> 
                </div>
              </div>
            </div>

            <div class="row mt-3">
              <div class="col-12">
                <ngb-pagination [(page)]="page" [pageSize]="pageSize" [collectionSize]="ordenes.length"></ngb-pagination>
              </div>
            </div>

          </div>
         
        </div>
      </section>
    
</main>

<app-footer></app-footer>
